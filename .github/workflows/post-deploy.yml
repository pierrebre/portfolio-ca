name: Post-Deploy (IndexNow + PageSpeed)

on:
  push:
    branches: [develop]

jobs:
  post-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need previous commit for diff

      - name: Detect changed URLs
        id: urls
        run: |
          CHANGED=$(./scripts/changed-urls.sh ${{ github.event.before }} ${{ github.sha }}) || true
          if [ -z "$CHANGED" ]; then
            echo "No URL-mapped files changed, skipping."
            echo "has_urls=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed URLs:"
            echo "$CHANGED"
            # Store as multiline output
            {
              echo "url_list<<EOF"
              echo "$CHANGED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_urls=true" >> "$GITHUB_OUTPUT"
          fi

      # --- IndexNow: submit only changed URLs ---
      - name: Submit to IndexNow
        if: steps.urls.outputs.has_urls == 'true'
        run: |
          echo "${{ steps.urls.outputs.url_list }}" | xargs ./scripts/indexnow.sh

      # --- PageSpeed Insights: test changed URLs ---
      - name: Run PageSpeed Insights
        if: steps.urls.outputs.has_urls == 'true'
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          echo "## PageSpeed Insights Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Page | Perf | A11y | Best Practices | SEO | LCP | CLS |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|------|----------------|-----|-----|-----|" >> "$GITHUB_STEP_SUMMARY"

          # Limit to 5 URLs max to avoid API rate limits
          URLS=$(echo "${{ steps.urls.outputs.url_list }}" | head -5)

          for URL in $URLS; do
            echo "Analyzing: ${URL}"
            SLUG=$(echo "$URL" | sed 's|https://pierrebarbe.ca||' | sed 's|^/$|/|')
            [ -z "$SLUG" ] && SLUG="/"

            RESULT=$(curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=mobile&category=performance&category=accessibility&category=best-practices&category=seo&key=${PSI_API_KEY}" 2>/dev/null) || continue

            PERF=$(echo "$RESULT" | jq -r '.lighthouseResult.categories.performance.score // empty' 2>/dev/null) || continue
            A11Y=$(echo "$RESULT" | jq -r '.lighthouseResult.categories.accessibility.score // empty' 2>/dev/null)
            BP=$(echo "$RESULT" | jq -r '.lighthouseResult.categories["best-practices"].score // empty' 2>/dev/null)
            SEO=$(echo "$RESULT" | jq -r '.lighthouseResult.categories.seo.score // empty' 2>/dev/null)
            LCP=$(echo "$RESULT" | jq -r '.lighthouseResult.audits["largest-contentful-paint"].displayValue // "—"' 2>/dev/null)
            CLS=$(echo "$RESULT" | jq -r '.lighthouseResult.audits["cumulative-layout-shift"].displayValue // "—"' 2>/dev/null)

            # Convert 0-1 scores to 0-100
            [ -n "$PERF" ] && PERF=$(awk "BEGIN {printf \"%.0f\", $PERF * 100}")  || PERF="—"
            [ -n "$A11Y" ] && A11Y=$(awk "BEGIN {printf \"%.0f\", $A11Y * 100}")  || A11Y="—"
            [ -n "$BP" ]   && BP=$(awk "BEGIN {printf \"%.0f\", $BP * 100}")      || BP="—"
            [ -n "$SEO" ]  && SEO=$(awk "BEGIN {printf \"%.0f\", $SEO * 100}")    || SEO="—"

            echo "| \`${SLUG}\` | ${PERF} | ${A11Y} | ${BP} | ${SEO} | ${LCP} | ${CLS} |" >> "$GITHUB_STEP_SUMMARY"

            # Be nice to the API
            sleep 3
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Mobile strategy — max 5 URLs per run_" >> "$GITHUB_STEP_SUMMARY"
